<!DOCTYPE html>
<html>

<head>

<title>Milky Way Digital Twin</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
}

.card{
background:white;
padding:20px;
margin:10px;
border-radius:12px;
box-shadow:0px 0px 10px rgba(0,0,0,.2);
font-size:24px;
}

</style>

</head>

<body>

<h1>🍫 Milky Way Digital Twin</h1>

<div class="card">
Temperature:
<span id="temp">0</span>
°C
</div>

<div class="card">
Vacuum Pressure:
<span id="pressure">0</span>
kPa
</div>

<div class="card">
Gripper Wear:
<span id="wear">0</span>
%
</div>

<div class="card">
Approved Chocolates:
<span id="approved">0</span>
</div>

<script>

// Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyCuyJ9a4z2VvGcYHJirJvC1v1VlviOILOU",
  authDomain: "data-vision-9fbe2.firebaseapp.com",
  databaseURL: "https://data-vision-9fbe2-default-rtdb.firebaseio.com",
  projectId: "data-vision-9fbe2",
  storageBucket: "data-vision-9fbe2.firebasestorage.app",
  messagingSenderId: "307018246519",
  appId: "1:307018246519:web:bd3bc4889d38a31cb7d972",
  measurementId: "G-HKWMSBNZLS"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

db.ref("milkyway/current")
.on("value",(snapshot)=>{

const data = snapshot.val();

if(!data) return;

document.getElementById("temp").innerText =
data.temperature;

document.getElementById("pressure").innerText =
data.vacuumPressure;

document.getElementById("wear").innerText =
data.gripperWear;

document.getElementById("approved").innerText =
data.approvedCount;

});

</script>

</body>

</html>
