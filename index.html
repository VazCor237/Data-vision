<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Milky Way Digital Twin</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>

body{
    font-family: Arial, sans-serif;
    background:#ececec;
    margin:0;
    padding:30px;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0px 4px 10px rgba(0,0,0,0.15);
}

.title{
    color:#666;
    font-size:18px;
}

.value{
    font-size:42px;
    font-weight:bold;
    margin-top:10px;
}

</style>

</head>

<body>

<h1>🍫 Milky Way Digital Twin</h1>

<div class="container">

    <div class="card">
        <div class="title">Temperature</div>
        <div class="value" id="temperature">0</div>
    </div>

    <div class="card">
        <div class="title">Vacuum Pressure</div>
        <div class="value" id="vacuumPressure">0</div>
    </div>

    <div class="card">
        <div class="title">Gripper Wear</div>
        <div class="value" id="gripperWear">0</div>
    </div>

    <div class="card">
        <div class="title">Approved Chocolates</div>
        <div class="value" id="approvedCount">0</div>
    </div>

    <div class="card">
        <div class="title">Rejected Chocolates</div>
        <div class="value" id="rejectedCount">0</div>
    </div>

    <div class="card">
        <div class="title">Robot Cycles</div>
        <div class="value" id="cycleCount">0</div>
    </div>

</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyCuyJ9a4z2VvGcYHJirJvC1v1VlviOILOU",
  authDomain: "data-vision-9fbe2.firebaseapp.com",
  databaseURL: "https://data-vision-9fbe2-default-rtdb.firebaseio.com",
  projectId: "data-vision-9fbe2",
  storageBucket: "data-vision-9fbe2.firebasestorage.app",
  messagingSenderId: "307018246519",
  appId: "1:307018246519:web:bd3bc4889d38a31cb7d972",
  measurementId: "G-HKWMSBNZLS"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

console.log("Firebase conectado");

db.ref().on("value", function(snapshot){

    const data = snapshot.val();

    console.log("Datos recibidos:");
    console.log(data);

    if(!data){
        console.log("No hay datos");
        return;
    }

    document.getElementById("temperature").innerHTML =
        data.temperature + " °C";

    document.getElementById("vacuumPressure").innerHTML =
        data.vacuumPressure + " kPa";

    document.getElementById("gripperWear").innerHTML =
        data.gripperWear + " %";

    document.getElementById("approvedCount").innerHTML =
        data.approvedCount;

    document.getElementById("rejectedCount").innerHTML =
        data.rejectedCount;

    document.getElementById("cycleCount").innerHTML =
        data.cycleCount;

});

</script>

</body>
</html>
