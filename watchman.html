<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Watchman - Anomaly Detection</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/charts/loader.js"></script>

<style>

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    padding: 30px;
    font-family: Arial, sans-serif;
    background: #F7F2EA;
    min-height: 100vh;
}

/* ── HEADER ── */
.header {
    text-align: center;
    margin-bottom: 40px;
    background: #F76915;
    border-radius: 20px;
    padding: 40px 30px 36px;
    box-shadow: 0 8px 32px rgba(247, 105, 21, 0.35);
}

.header-logo {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid rgba(255, 255, 255, 0.6);
    margin-bottom: 16px;
    display: block;
    margin-left: auto;
    margin-right: auto;
}

.header h1 {
    margin: 0 0 8px 0;
    font-size: 52px;
    font-weight: bold;
    color: #FFFFFF;
    letter-spacing: 1px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.18);
}

.header p {
    color: rgba(255, 255, 255, 0.92);
    font-size: 20px;
    margin: 0;
    font-weight: 500;
    letter-spacing: 0.5px;
}

/* ── KPI CARDS ── */
.dashboard {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.card {
    background: #FFFFFF;
    border-radius: 15px;
    padding: 28px 25px;
    box-shadow: 0 4px 16px rgba(90, 53, 19, 0.10);
    text-align: center;
    border-left: 8px solid #F76915;
    transition: transform 0.22s ease, box-shadow 0.22s ease;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 30px rgba(247, 105, 21, 0.22);
}

.card h2 {
    margin-top: 0;
    margin-bottom: 14px;
    color: #5A3513;
    font-size: 17px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.value {
    font-size: 42px;
    font-weight: bold;
    color: #5A3513;
}

/* ── CHART CONTAINER ── */
.chart-placeholder {
    margin-top: 30px;
    background: #FFFFFF;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 4px 16px rgba(90, 53, 19, 0.10);
    text-align: center;
    border-left: 8px solid #F76915;
}

.chart-placeholder h2 {
    margin-top: 0;
    margin-bottom: 20px;
    color: #5A3513;
    font-size: 17px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

/* ── AI SECTION ── */
.alert-box {
    margin-top: 30px;
    background: #F7F2EA;
    border: 2px solid #F76915;
    border-radius: 15px;
    padding: 32px 28px;
}

.alert-box h2 {
    margin-top: 0;
    margin-bottom: 18px;
    color: #5A3513;
    font-size: 17px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

/* ── BUTTONS ── */
.ai-button {
    padding: 13px 28px;
    background: #F76915;
    color: #FFFFFF;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
    font-weight: bold;
    font-family: Arial, sans-serif;
    transition: background 0.2s ease, transform 0.15s ease;
}

.ai-button:hover {
    background: #d9550f;
    transform: translateY(-1px);
}

.back-button {
    display: inline-block;
    margin-top: 30px;
    padding: 13px 28px;
    background: #F76915;
    color: #FFFFFF;
    text-decoration: none;
    border-radius: 10px;
    font-weight: bold;
    font-size: 16px;
    font-family: Arial, sans-serif;
    transition: background 0.2s ease, transform 0.15s ease;
}

.back-button:hover {
    background: #d9550f;
    transform: translateY(-1px);
}

/* ── AI LOADING / RESPONSE ── */
#loading {
    display: none;
    margin-top: 15px;
    font-weight: bold;
    color: #5A3513;
}

#aiResponse {
    display: none;
    margin-top: 15px;
    line-height: 1.6;
    color: #5A3513;
}

/* ── CHART DIV ── */
#jamChart {
    width: 100%;
    height: 450px;
}

/* ── FOOTER ── */
.footer {
    text-align: center;
    margin-top: 48px;
    padding: 18px 0 4px;
    color: #5A3513;
    font-weight: bold;
    font-size: 15px;
    letter-spacing: 0.3px;
}

</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
    <img class="header-logo" src="download.jpg" alt="Pastelería Lety Logo">
    <h1>WATCHMAN SCADA 4.0</h1>
    <p>Pastelería Lety &nbsp;•&nbsp; Anomaly Detection Module</p>
</div>

<!-- KPI CARDS -->
<div class="dashboard">

    <div class="card">
        <h2>Bar Temperature</h2>
        <div class="value" id="temperature">0 °C</div>
    </div>

    <div class="card">
        <h2>Wrapper Jam Count</h2>
        <div class="value" id="jamCount">0</div>
    </div>

</div>

<!-- CHART -->
<div class="chart-placeholder">
    <h2>Wrapper Jam Trend</h2>
    <div id="jamChart"></div>
</div>

<!-- AI SECTION -->
<div class="alert-box">
    <h2>AI Anomaly Detection</h2>
    <button class="ai-button" id="analyzeBtn">Analyze with AI</button>
    <p id="loading">Analyzing...</p>
    <p id="aiResponse">Waiting for AI analysis...</p>
</div>

<!-- BACK BUTTON -->
<a class="back-button" href="index.html">⬅ Back to Dashboard</a>

<!-- FOOTER -->
<div class="footer">
    Pastelería Lety &nbsp;•&nbsp; SCADA 4.0 Demonstration Platform
</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyCuyJ9a4z2VvGcYHJirJvC1v1VlviOILOU",
  authDomain: "data-vision-9fbe2.firebaseapp.com",
  databaseURL: "https://data-vision-9fbe2-default-rtdb.firebaseio.com",
  projectId: "data-vision-9fbe2",
  storageBucket: "data-vision-9fbe2.firebasestorage.app",
  messagingSenderId: "307018246519",
  appId: "1:307018246519:web:bd3bc4889d38a31cb7d972"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

db.ref("current").on("value",(snapshot)=>{

    const data = snapshot.val();

    if(!data) return;

    document.getElementById("temperature").innerHTML =
        data.unpacking.bar_temperature.toFixed(2) + " °C";

    document.getElementById("jamCount").innerHTML =
        data.splitting.wrapper_jam_count;

});

/* AI RESPONSE */

document.getElementById("analyzeBtn").addEventListener("click",()=>{

    document.getElementById("loading").style.display =
        "block";

    document.getElementById("aiResponse").style.display =
        "none";

    db.ref("ai/watchman/response")
    .once("value")
    .then((snapshot)=>{

        const aiText = snapshot.val();

        document.getElementById("loading").style.display =
            "none";

        document.getElementById("aiResponse").style.display =
            "block";

        document.getElementById("aiResponse").innerHTML =
            aiText || "No AI response available.";

    });

});

/* GOOGLE CHART */

google.charts.load('current',{
    packages:['corechart']
});

google.charts.setOnLoadCallback(loadJamChart);

function loadJamChart(){

    db.ref("history").on("value",(snapshot)=>{

        const history = snapshot.val();

        if(!history) return;

        let chartData = [
            ["Sample","Wrapper Jam Count"]
        ];

        let counter = 1;

        const records =
            Object.values(history).slice(-50);
        
        records.forEach(record=>{
        
            chartData.push([
                "S" + counter,
                Number(record.splitting.wrapper_jam_count)
            ]);
        
            counter++;
        
        });

        const data =
            google.visualization.arrayToDataTable(chartData);

        const options = {

            title: "Wrapper Jam Count Trend",

            curveType: "function",

            legend: {
                position: "none"
            },

            hAxis: {
                title: "Production Samples"
            },

            vAxis: {
                title: "Jam Count"
            }

        };

        const chart =
            new google.visualization.LineChart(
                document.getElementById("jamChart")
            );

        chart.draw(data, options);

    });

}

</script>

</body>
</html>
