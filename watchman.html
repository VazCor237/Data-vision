<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Watchman - Anomaly Detection</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/charts/loader.js"></script>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:30px;
    font-family:Arial,sans-serif;
    background:#f0f2f5;
}

.header{
    text-align:center;
    margin-bottom:40px;
}

.header h1{
    margin:0;
    font-size:48px;
}

.header p{
    color:#666;
    font-size:18px;
}

.dashboard{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:15px;
    padding:25px;
    box-shadow:0px 4px 12px rgba(0,0,0,0.12);
    text-align:center;
}

.card h2{
    margin-top:0;
    color:#555;
}

.value{
    font-size:42px;
    font-weight:bold;
}

.chart-placeholder{
    margin-top:40px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0px 4px 12px rgba(0,0,0,0.12);
    text-align:center;
}

.alert-box{
    margin-top:30px;
    background:#fff3cd;
    border:1px solid #ffe69c;
    border-radius:15px;
    padding:20px;
}

.back-button{
    display:inline-block;
    margin-top:30px;
    padding:15px 25px;
    background:#2c3e50;
    color:white;
    text-decoration:none;
    border-radius:10px;
}

.ai-button{
    padding:12px 20px;
    background:#2c3e50;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}

.ai-button:hover{
    background:#34495e;
}

#loading{
    display:none;
    margin-top:15px;
    font-weight:bold;
}

#aiResponse{
    display:none;
    margin-top:15px;
    line-height:1.6;
}

#jamChart{
    width:100%;
    height:450px;
}

</style>

</head>

<body>

<div class="header">

<h1>👁️ Student A - Watchman</h1>

<p>Anomaly Detection Module</p>

</div>

<div class="dashboard">

<div class="card">
<h2>Bar Temperature</h2>
<div class="value" id="temperature">0 °C</div>
</div>

<div class="card">
<h2>Wrapper Jam Count</h2>
<div class="value" id="jamCount">0</div>
</div>

</div>

<div class="chart-placeholder">

<h2>Wrapper Jam Trend</h2>

<div id="jamChart"></div>

</div>

<div class="alert-box">

<h2>AI Anomaly Detection</h2>

<button class="ai-button" id="analyzeBtn">
Analyze with AI
</button>

<p id="loading">
Analyzing...
</p>

<p id="aiResponse">
Waiting for AI analysis...
</p>

</div>

<a class="back-button" href="index.html">
⬅ Back to Dashboard
</a>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyCuyJ9a4z2VvGcYHJirJvC1v1VlviOILOU",
  authDomain: "data-vision-9fbe2.firebaseapp.com",
  databaseURL: "https://data-vision-9fbe2-default-rtdb.firebaseio.com",
  projectId: "data-vision-9fbe2",
  storageBucket: "data-vision-9fbe2.firebasestorage.app",
  messagingSenderId: "307018246519",
  appId: "1:307018246519:web:bd3bc4889d38a31cb7d972"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

db.ref("current").on("value",(snapshot)=>{

    const data = snapshot.val();

    if(!data) return;

    document.getElementById("temperature").innerHTML =
        data.unpacking.bar_temperature.toFixed(2) + " °C";

    document.getElementById("jamCount").innerHTML =
        data.splitting.wrapper_jam_count;

});

/* AI RESPONSE */

document.getElementById("analyzeBtn").addEventListener("click",()=>{

    document.getElementById("loading").style.display =
        "block";

    document.getElementById("aiResponse").style.display =
        "none";

    db.ref("ai/watchman/response")
    .once("value")
    .then((snapshot)=>{

        const aiText = snapshot.val();

        document.getElementById("loading").style.display =
            "none";

        document.getElementById("aiResponse").style.display =
            "block";

        document.getElementById("aiResponse").innerHTML =
            aiText || "No AI response available.";

    });

});

/* GOOGLE CHART */

google.charts.load('current',{
    packages:['corechart']
});

google.charts.setOnLoadCallback(loadJamChart);

function loadJamChart(){

    db.ref("history").on("value",(snapshot)=>{

        const history = snapshot.val();

        if(!history) return;

        let chartData = [
            ["Sample","Wrapper Jam Count"]
        ];

        let counter = 1;

        Object.values(history).forEach(record=>{

            chartData.push([
                "S" + counter,
                Number(record.splitting.wrapper_jam_count)
            ]);

            counter++;

        });

        const data =
            google.visualization.arrayToDataTable(chartData);

        const options = {

            title: "Wrapper Jam Count Trend",

            curveType: "function",

            legend: {
                position: "none"
            },

            hAxis: {
                title: "Production Samples"
            },

            vAxis: {
                title: "Jam Count"
            }

        };

        const chart =
            new google.visualization.LineChart(
                document.getElementById("jamChart")
            );

        chart.draw(data, options);

    });

}

</script>

</body>

</html>
