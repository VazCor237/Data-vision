<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Coordinator - Decision Support</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>

*{box-sizing:border-box;}

body{
    margin:0;
    padding:30px;
    font-family:Arial,sans-serif;
    background:#f0f2f5;
}

.header{
    text-align:center;
    margin-bottom:40px;
}

.header h1{
    margin:0;
    font-size:48px;
}

.header p{
    color:#666;
    font-size:18px;
}

.dashboard{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:15px;
    padding:25px;
    box-shadow:0px 4px 12px rgba(0,0,0,0.12);
    text-align:center;
}

.value{
    font-size:42px;
    font-weight:bold;
}

.chart-placeholder{
    margin-top:40px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0px 4px 12px rgba(0,0,0,0.12);
    text-align:center;
}

.alert-box{
    margin-top:30px;
    background:#f8d7da;
    border:1px solid #f5c6cb;
    border-radius:15px;
    padding:20px;
}

.back-button{
    display:inline-block;
    margin-top:30px;
    padding:15px 25px;
    background:#2c3e50;
    color:white;
    text-decoration:none;
    border-radius:10px;
}

</style>

</head>

<body>

<div class="header">

<h1>📋 Student D - Coordinator</h1>

<p>Decision Support Module</p>

</div>

<div class="dashboard">

<div class="card">
<h2>Feed Rate</h2>
<div class="value" id="feedRate">0</div>
</div>

<div class="card">
<h2>Reject Count</h2>
<div class="value" id="rejectCount">0</div>
</div>

<div class="card">
<h2>Pushcart Fill Level</h2>
<div class="value" id="fillLevel">0 %</div>
</div>

</div>

<div class="chart-placeholder">
<h2>Production Overview</h2>
<p>Future KPI Dashboard</p>
</div>

<div class="chart-placeholder">
<h2>Decision Support Metrics</h2>
<p>Future Analytics Dashboard</p>
</div>

<div class="alert-box">
<h2>AI Decision Support</h2>
<p>Future Gemini recommendations will appear here.</p>
</div>

<a class="back-button" href="index.html">
⬅ Back to Dashboard
</a>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyCuyJ9a4z2VvGcYHJirJvC1v1VlviOILOU",
  authDomain: "data-vision-9fbe2.firebaseapp.com",
  databaseURL: "https://data-vision-9fbe2-default-rtdb.firebaseio.com",
  projectId: "data-vision-9fbe2",
  storageBucket: "data-vision-9fbe2.firebasestorage.app",
  messagingSenderId: "307018246519",
  appId: "1:307018246519:web:bd3bc4889d38a31cb7d972"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

db.ref("current").on("value",(snapshot)=>{

    const data = snapshot.val();

    if(!data) return;

    document.getElementById("feedRate").innerHTML =
        data.unpacking.feed_rate;

    document.getElementById("rejectCount").innerHTML =
        data.unpacking.reject_count;

    document.getElementById("fillLevel").innerHTML =
        data.dispatch.pushcart_fill_level + " %";

});

</script>

</body>

</html>
